<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geo TDS Tracker Admin</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #0f766e;
      --primary-2: #115e59;
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f7f8fa 0%, #ecfdf5 100%);
      color: var(--text);
    }
    .container { max-width: 1080px; margin: 0 auto; display: grid; gap: 16px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 24px rgba(17, 24, 39, 0.06);
    }
    h1 { margin: 0; font-size: 1.4rem; }
    .muted { color: var(--muted); font-size: 0.92rem; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input, select, button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    input, select { background: #fff; min-width: 120px; }
    input[type="url"], input[type="text"] { flex: 1 1 220px; }
    button {
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      border: 1px solid var(--primary);
      font-weight: 600;
    }
    button:hover { background: var(--primary-2); }
    button.ghost {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }
    button.danger { background: var(--danger); border-color: var(--danger); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; border-bottom: 1px solid var(--line); padding: 10px 8px; font-size: 14px; }
    th { color: var(--muted); font-weight: 600; }
    code { background: #f3f4f6; border-radius: 8px; padding: 2px 6px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .link-row {
      display: grid;
      grid-template-columns: 90px 1fr 110px 90px 80px;
      gap: 8px;
      margin-bottom: 8px;
    }
    .status { font-size: 13px; min-height: 18px; }
    .status.ok { color: #166534; }
    .status.err { color: #991b1b; }
    @media (max-width: 900px) {
      .grid2 { grid-template-columns: 1fr; }
      .link-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Geo TDS Tracker</h1>
      <div class="muted">Создавайте мультиссылки по GEO. Публичный формат: <code>/go/&lt;slug&gt;</code></div>
    </div>

    <div class="card">
      <div class="row">
        <input id="token" type="text" placeholder="ADMIN_TOKEN" />
        <button onclick="saveToken()">Сохранить токен</button>
        <button class="ghost" onclick="checkAuth()">Проверить доступ</button>
      </div>
      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <h3>Новая кампания</h3>
      <div class="grid2">
        <input id="name" type="text" placeholder="Название" />
        <input id="slug" type="text" placeholder="Slug (опционально)" />
        <input id="default_url" type="url" placeholder="Default URL (fallback)" />
        <input id="click_limit" type="number" placeholder="Click limit (опционально)" min="1" />
      </div>
      <div class="row" style="margin-top: 10px;">
        <label><input id="is_active" type="checkbox" checked /> Active</label>
        <label><input id="block_bots" type="checkbox" checked /> Block bots</label>
      </div>

      <h4>Country URLs</h4>
      <div id="links"></div>
      <button class="ghost" onclick="addLinkRow()">+ Добавить GEO ссылку</button>
      <button onclick="createCampaign()">Создать кампанию</button>
    </div>

    <div class="card">
      <div class="row" style="justify-content: space-between;">
        <h3 style="margin:0;">Кампании</h3>
        <button class="ghost" onclick="loadCampaigns()">Обновить</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Slug</th>
            <th>Links</th>
            <th>Clicks</th>
            <th>Go URL</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="campaigns"></tbody>
      </table>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const statusEl = $('status');

    function api(path, options = {}) {
      const token = $('token').value.trim();
      return fetch(path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
          ...(options.headers || {}),
        },
      }).then(async (r) => {
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
        return data;
      });
    }

    function setStatus(msg, ok = true) {
      statusEl.textContent = msg;
      statusEl.className = `status ${ok ? 'ok' : 'err'}`;
    }

    function saveToken() {
      localStorage.setItem('geo_tds_token', $('token').value.trim());
      setStatus('Токен сохранён');
    }

    async function checkAuth() {
      try {
        await api('/api/admin/me');
        setStatus('Доступ подтверждён');
      } catch (e) {
        setStatus(e.message, false);
      }
    }

    function addLinkRow(link = {}) {
      const wrap = document.createElement('div');
      wrap.className = 'link-row';
      wrap.innerHTML = `
        <input placeholder="US" maxlength="2" value="${link.country_code || ''}" />
        <input type="url" placeholder="https://offer.example" value="${link.url || ''}" />
        <select>
          <option value="all" ${link.device_type === 'all' ? 'selected' : ''}>all</option>
          <option value="desktop" ${link.device_type === 'desktop' ? 'selected' : ''}>desktop</option>
          <option value="mobile" ${link.device_type === 'mobile' ? 'selected' : ''}>mobile</option>
          <option value="tablet" ${link.device_type === 'tablet' ? 'selected' : ''}>tablet</option>
        </select>
        <input type="number" min="1" value="${link.weight || 100}" />
        <button type="button" class="danger" onclick="this.parentElement.remove()">Удалить</button>
      `;
      $('links').appendChild(wrap);
    }

    function collectLinks() {
      const rows = [...document.querySelectorAll('#links .link-row')];
      return rows.map((row) => {
        const inputs = row.querySelectorAll('input, select');
        return {
          country_code: inputs[0].value.trim().toUpperCase(),
          url: inputs[1].value.trim(),
          device_type: inputs[2].value,
          weight: Number(inputs[3].value || 100),
        };
      }).filter((x) => x.country_code && x.url);
    }

    async function createCampaign() {
      try {
        const payload = {
          name: $('name').value.trim(),
          slug: $('slug').value.trim() || undefined,
          default_url: $('default_url').value.trim(),
          click_limit: $('click_limit').value ? Number($('click_limit').value) : null,
          is_active: $('is_active').checked,
          block_bots: $('block_bots').checked,
          links: collectLinks(),
        };
        await api('/api/admin/tds/campaigns', { method: 'POST', body: JSON.stringify(payload) });
        setStatus('Кампания создана');
        $('name').value = '';
        $('slug').value = '';
        $('default_url').value = '';
        $('click_limit').value = '';
        $('links').innerHTML = '';
        addLinkRow();
        loadCampaigns();
      } catch (e) {
        setStatus(e.message, false);
      }
    }

    async function deleteCampaign(id) {
      if (!confirm(`Удалить кампанию #${id}?`)) return;
      try {
        await api(`/api/admin/tds/campaigns/${id}`, { method: 'DELETE' });
        setStatus('Кампания удалена');
        loadCampaigns();
      } catch (e) {
        setStatus(e.message, false);
      }
    }

    async function loadCampaigns() {
      const tbody = $('campaigns');
      tbody.innerHTML = '<tr><td colspan="7">Loading...</td></tr>';
      try {
        const data = await api('/api/admin/tds/campaigns');
        if (!data.campaigns.length) {
          tbody.innerHTML = '<tr><td colspan="7">Нет кампаний</td></tr>';
          return;
        }

        tbody.innerHTML = data.campaigns.map((c) => {
          const url = `${location.origin}/go/${c.slug}`;
          return `
            <tr>
              <td>${c.id}</td>
              <td>${c.name}</td>
              <td><code>${c.slug}</code></td>
              <td>${c.link_count}</td>
              <td>${c.click_count}</td>
              <td><a href="${url}" target="_blank">${url}</a></td>
              <td><button class="danger" onclick="deleteCampaign(${c.id})">Delete</button></td>
            </tr>
          `;
        }).join('');
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="7">${e.message}</td></tr>`;
      }
    }

    (function init() {
      const saved = localStorage.getItem('geo_tds_token') || '';
      $('token').value = saved;
      addLinkRow();
      if (saved) loadCampaigns();
    })();
  </script>
</body>
</html>
